<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Responsive Digital Clock</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            flex-direction: column;\n            height: 100vh;\n            background-color: #282c34;\n            color: white;\n            font-family: Arial, sans-serif;\n        }\n        .clock {\n            font-size: 3em;\n            margin: 20px;\n        }\n    </style>\n</head>\n<body>\n    <div class='clock' id='clock'></div>\n    <script>\n        function updateClock() {\n            const now = new Date();\n            const timeZones = {\n                'UTC': now.toUTCString().slice(17, 26),\n                'EST': new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' })).toLocaleTimeString(),\n                'PST': new Date(now.toLocaleString('en-US', { timeZone: 'America/Los_Angeles' })).toLocaleTimeString(),\n                'GMT': now.toGMTString().slice(17, 26),\n                'IST': new Date(now.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' })).toLocaleTimeString(),\n                'JST': new Date(now.toLocaleString('en-JP', { timeZone: 'Asia/Tokyo' })).toLocaleTimeString(),\n                'AEST': new Date(now.toLocaleString('en-AU', { timeZone: 'Australia/Sydney' })).toLocaleTimeString()\n            };\n            let clockString = '';\n            for (const [zone, time] of Object.entries(timeZones)) {\n                clockString += `${zone}: ${time} | `;\n            }\n            document.getElementById('clock').innerText = clockString.slice(0, -3);\n        }\n        setInterval(updateClock, 1000);\n        updateClock();\n    </script>\n</body>\n</html>
