<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android TV Optimized Design</title>
    <style>
        body {
            font-size: 24px;
            font-family: Arial, sans-serif;
            color: white;
            background-color: #000;
            padding: 20px;
        }
        .timezone {
            margin: 20px 0;
        }
        .clock {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Android TV Application</h1>
    <div class="timezones">
        <div class="timezone">UTC: <span class="clock" id="utc-time"></span></div>
        <div class="timezone">EST: <span class="clock" id="est-time"></span></div>
        <div class="timezone">PST: <span class="clock" id="pst-time"></span></div>
        <div class="timezone">GMT: <span class="clock" id="gmt-time"></span></div>
        <div class="timezone">IST: <span class="clock" id="ist-time"></span></div>
        <div class="timezone">JST: <span class="clock" id="jst-time"></span></div>
        <div class="timezone">AEST: <span class="clock" id="aest-time"></span></div>
    </div>
    <script>
        function updateClocks() {
            const options = {timeZone: 'UTC', hour: '2-digit', minute: '2-digit', second: '2-digit'};
            const utcTime = new Date().toLocaleString('en-US', options);
            document.getElementById('utc-time').textContent = utcTime;
            options.timeZone = 'America/New_York';
            const estTime = new Date().toLocaleString('en-US', options);
            document.getElementById('est-time').textContent = estTime;
            options.timeZone = 'America/Los_Angeles';
            const pstTime = new Date().toLocaleString('en-US', options);
            document.getElementById('pst-time').textContent = pstTime;
            options.timeZone = 'Europe/London';
            const gmtTime = new Date().toLocaleString('en-US', options);
            document.getElementById('gmt-time').textContent = gmtTime;
            options.timeZone = 'Asia/Kolkata';
            const istTime = new Date().toLocaleString('en-US', options);
            document.getElementById('ist-time').textContent = istTime;
            options.timeZone = 'Asia/Tokyo';
            const jstTime = new Date().toLocaleString('en-US', options);
            document.getElementById('jst-time').textContent = jstTime;
            options.timeZone = 'Australia/Sydney';
            const aestTime = new Date().toLocaleString('en-US', options);
            document.getElementById('aest-time').textContent = aestTime;
        }
        // Update clocks every second
        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
