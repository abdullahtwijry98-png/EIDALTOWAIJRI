<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #282c34;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 48px;
        }
        .clock {
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="clock" id="utc"></div>
    <div class="clock" id="est"></div>
    <div class="clock" id="gmt"></div>
    <div class="clock" id="ist"></div>
    <div class="clock" id="jst"></div>
    <div class="clock" id="pst"></div>
    <div class="clock" id="aest"></div>
    <script>
        function updateClocks() {
            const now = new Date();
            document.getElementById('utc').innerText = 'UTC: ' + now.toUTCString();
            document.getElementById('est').innerText = 'EST: ' + new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' })).toLocaleString();
            document.getElementById('gmt').innerText = 'GMT: ' + now.toGMTString();
            document.getElementById('ist').innerText = 'IST: ' + new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' })).toLocaleString();
            document.getElementById('jst').innerText = 'JST: ' + new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Tokyo' })).toLocaleString();
            document.getElementById('pst').innerText = 'PST: ' + new Date(now.toLocaleString('en-US', { timeZone: 'America/Los_Angeles' })).toLocaleString();
            document.getElementById('aest').innerText = 'AEST: ' + new Date(now.toLocaleString('en-US', { timeZone: 'Australia/Sydney' })).toLocaleString();
        }
        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
