<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: black;
            color: white;
            font-size: 48px;
            font-family: Arial, sans-serif;
        }
        .clock {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="clock">
        <div id="time"></div>
        <div>
            <div id="utc"></div>
            <div id="est"></div>
            <div id="gmt"></div>
            <div id="ist"></div>
            <div id="jst"></div>
            <div id="pst"></div>
            <div id="aest"></div>
        </div>
    </div>
    <script>
        function updateTime() {
            const utcOffset = new Date().getTimezoneOffset();
            const now = new Date();
            document.getElementById('utc').innerText = 'UTC Time: ' + new Date(now.getTime() + utcOffset * 60000).toISOString().substr(11, 8);
            document.getElementById('est').innerText = 'EST Time: ' + new Date(now.getTime() - 5 * 60 * 60 * 1000).toISOString().substr(11, 8);
            document.getElementById('gmt').innerText = 'GMT Time: ' + new Date(now.getTime()).toISOString().substr(11, 8);
            document.getElementById('ist').innerText = 'IST Time: ' + new Date(now.getTime() + 5.5 * 60 * 60 * 1000).toISOString().substr(11, 8);
            document.getElementById('jst').innerText = 'JST Time: ' + new Date(now.getTime() + 9 * 60 * 60 * 1000).toISOString().substr(11, 8);
            document.getElementById('pst').innerText = 'PST Time: ' + new Date(now.getTime() - 8 * 60 * 60 * 1000).toISOString().substr(11, 8);
            document.getElementById('aest').innerText = 'AEST Time: ' + new Date(now.getTime() + 10 * 60 * 60 * 1000).toISOString().substr(11, 8);
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
