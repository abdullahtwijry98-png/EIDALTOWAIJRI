<!DOCTYPE html>
<html>
<head>
    <title>Digital Clock</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .clock-container { display: flex; justify-content: space-around; margin-top: 20px; }
        .clock { font-size: 24px; }
    </style>
</head>
<body>
    <h1>Digital Clock</h1>
    <div class="clock-container">
        <div class="clock" id="clock-utc">UTC: </div>
        <div class="clock" id="clock-est">EST: </div>
        <div class="clock" id="clock-gmt">GMT: </div>
    </div>
    <script>
        function updateClocks() {
            const now = new Date();
            const utc = now.toUTCString().split(' ')[4]; // get UTC time
            document.getElementById('clock-utc').innerText = 'UTC: ' + utc;

            const est = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
            document.getElementById('clock-est').innerText = 'EST: ' + est.toTimeString().split(' ')[0];

            const gmt = new Date(now.toLocaleString('en-GB', { timeZone: 'Europe/London' }));
            document.getElementById('clock-gmt').innerText = 'GMT: ' + gmt.toTimeString().split(' ')[0];
        }
        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
